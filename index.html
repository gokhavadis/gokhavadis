<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Gök Havadis - Kontrol Paneli</title>
    <style>
        :root { --bg: #0f2027; --card-bg: rgba(255, 255, 255, 0.08); }
        body { background: linear-gradient(135deg, #0f2027, #203a43); color: white; margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; }
        
        /* MODERN BENTO GRID YAPISI */
        .dashboard { 
            display: grid; 
            grid-template-columns: 1fr 350px; 
            gap: 20px; 
            max-width: 1400px; 
            margin: auto; 
        }

        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 25px; 
            border-radius: 20px; 
        }

        /* 5 Saatlik Tahmin */
        .forecast-row { display: flex; gap: 15px; overflow-x: auto; margin-top: 15px; }
        .f-card { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; flex: 1; text-align: center; }

        /* Sidebar (Sağ Taraf) */
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        
        /* Mobil Uyum */
        @media (max-width: 900px) { .dashboard { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="dashboard">
    <main style="display: flex; flex-direction: column; gap: 20px;">
        <div class="card">
            <h1>GÖK HAVADİS</h1>
            <p>Sakarya Atmosferik Gözlem Paneli</p>
        </div>

        <div class="card">
            <h3>5 Saatlik Tahmin</h3>
            <div class="forecast-row">
                <div class="f-card">19:00<br>☁️<br><b>19°C</b></div>
                <div class="f-card">20:00<br>🌤️<br><b>18°C</b></div>
                <div class="f-card">21:00<br>🌙<br><b>17°C</b></div>
                <div class="f-card">22:00<br>🌙<br><b>16°C</b></div>
                <div class="f-card">23:00<br>🌙<br><b>15°C</b></div>
            </div>
        </div>

        <div class="card">
            <h3>Canlı Radar Verisi</h3>
            <div style="height: 300px; background: rgba(0,0,0,0.3); border-radius: 10px; display: flex; align-items: center; justify-content: center;">
                Radar Haritası Buraya
            </div>
        </div>
    </main>

    <aside class="sidebar">
        <div class="card">
            <h3>SİSTEM DURUMU</h3>
            <p style="color: #2ecc71;">● Bağlantı Aktif</p>
        </div>
        <div class="card" style="background: rgba(231, 76, 60, 0.1);">
            <h3>UYARILAR</h3>
            <p style="font-size: 0.9rem;">Aktif uyarı bulunmuyor.</p>
        </div>
        <div class="card" style="flex-grow: 1; display: flex; align-items: center; justify-content: center; text-align: center;">
            <div style="font-weight: bold; color: #ffb703;">GÖK HAVADİS<br>VERİ AKIŞI</div>
        </div>
    </aside>
</div>

</body>
</html>
