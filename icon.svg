<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c5364" />
      <stop offset="50%" stop-color="#203a43" />
      <stop offset="100%" stop-color="#0f2027" />
    </linearGradient>
    
    <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#95a5a6" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="110" fill="url(#bgGradient)" />
  
  <path d="M 280 100 L 170 290 L 250 290 L 220 440 L 370 230 L 280 230 Z" fill="#f39c12" filter="url(#glow)">
    <animate attributeName="opacity" values="0.9; 1; 0.4; 0.9" dur="2s" repeatCount="indefinite" />
  </path>
  
  <path d="M 150 320 
           C 70 320 60 240 120 190 
           C 140 120 240 100 300 150 
           C 370 110 460 160 420 240 
           C 480 280 430 320 370 320 
           Z" 
        fill="url(#cloudGradient)" opacity="0.95" />
        
  <path d="M 140 120 Q 256 30 372 120" fill="none" stroke="#a8dadc" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <path d="M 180 80 Q 256 -10 332 80" fill="none" stroke="#a8dadc" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
</svg>
